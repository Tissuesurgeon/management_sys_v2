<section class="space-y-3" aria-labelledby="{{ perf_heading_id|default:'worker-perf-heading' }}">
  <h2 id="{{ perf_heading_id|default:'worker-perf-heading' }}" class="flex items-center gap-2 text-sm font-bold text-slate-900">
    <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-white text-slate-600 shadow-sm" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16v-4"/><path d="M12 16v-9"/><path d="M17 16v-6"/></svg>
    </span>
    Performance stats
  </h2>
  <div class="space-y-2">
    <div class="rounded-xl border border-slate-100 bg-white px-4 py-3 shadow-sm">
      <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Tasks completed</p>
      <div class="mt-1 flex items-end justify-between gap-2">
        <p class="text-2xl font-bold tabular-nums text-slate-900">{{ worker.tasks_completed|default:0 }}</p>
        {% if worker.reliability >= 90 %}
        <span class="rounded-full bg-emerald-50 px-2 py-0.5 text-xs font-semibold text-emerald-700">On track</span>
        {% endif %}
      </div>
    </div>
    <div class="rounded-xl border border-slate-100 bg-white px-4 py-3 shadow-sm">
      <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Avg. resolution</p>
      <p class="mt-1 text-2xl font-bold tabular-nums text-slate-900">{{ worker.avg_resolution_min|default:0 }} <span class="text-base font-semibold text-slate-600">min</span></p>
    </div>
    <div class="rounded-xl border border-slate-100 bg-white px-4 py-3 shadow-sm">
      <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Reliability score</p>
      <p class="mt-1 text-2xl font-bold tabular-nums text-slate-900">{{ worker.reliability|floatformat:1 }}%</p>
    </div>
    <div class="rounded-xl border border-slate-100 bg-white px-4 py-4 shadow-sm" aria-hidden="true">
      <p class="mb-3 text-[10px] font-bold uppercase tracking-wider text-slate-400">Activity (illustrative)</p>
      <div class="flex h-24 items-end justify-between gap-1 px-1">
        <div class="w-full rounded-t bg-slate-200" style="height:35%"></div>
        <div class="w-full rounded-t bg-slate-200" style="height:55%"></div>
        <div class="w-full rounded-t bg-slate-200" style="height:45%"></div>
        <div class="w-full rounded-t bg-slate-800" style="height:85%"></div>
        <div class="w-full rounded-t bg-slate-200" style="height:40%"></div>
        <div class="w-full rounded-t bg-slate-200" style="height:65%"></div>
        <div class="w-full rounded-t bg-slate-200" style="height:50%"></div>
      </div>
    </div>
  </div>
</section>
