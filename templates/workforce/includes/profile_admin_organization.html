<section class="space-y-3" aria-labelledby="{{ org_heading_id|default:'admin-org-heading' }}">
  <h2 id="{{ org_heading_id|default:'admin-org-heading' }}" class="flex items-center gap-2 text-sm font-bold text-slate-900">
    <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-white text-slate-600 shadow-sm" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </span>
    Organization
  </h2>
  <div class="rounded-xl border border-slate-100 bg-white p-4 text-sm text-slate-600 shadow-sm">
    <ul class="list-inside list-disc space-y-2">
      <li>You are signed in as a <strong class="text-slate-800">facility manager</strong>.</li>
      <li>Use the sidebar to manage workers, calendar, and task reporting.</li>
      {% if user.email %}
      <li>Account email: <span class="font-medium text-slate-800">{{ user.email }}</span></li>
      {% endif %}
    </ul>
  </div>
</section>
