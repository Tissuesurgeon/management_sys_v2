{# Shared top header — matches AdminLayout / WorkerLayout #}
<header class="safe-pt sticky top-0 z-30 w-full min-w-0 overflow-x-clip border-b border-slate-200/60 bg-white px-4 py-3 shadow-sm shadow-slate-900/5 md:px-8 md:shadow-none">
  <div class="mx-auto flex w-full min-w-0 max-w-5xl items-center justify-between gap-2 sm:gap-3">
    <div class="flex min-w-0 items-center gap-3">
      <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-[#1e293b] text-[11px] font-bold leading-tight text-white shadow-sm">
        FM
      </div>
      <div class="min-w-0">
        <p class="truncate text-base font-bold tracking-tight text-slate-900 md:text-sm md:tracking-wide">FM OPS</p>
        <p class="hidden truncate text-[10px] font-medium uppercase tracking-[0.2em] text-slate-500 md:block">management system</p>
      </div>
    </div>
    <div class="flex shrink-0 items-center gap-1">
      <button type="button" class="min-h-11 min-w-11 rounded-lg p-2 text-slate-500 touch-manipulation hover:bg-slate-100 active:bg-slate-200" aria-label="Notifications">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
      </button>
      {% if profile_url %}
        <a href="{{ profile_url }}" class="group relative h-9 w-9 shrink-0 overflow-hidden rounded-full ring-2 ring-white touch-manipulation hover:opacity-95 active:opacity-90" aria-label="Profile">
          {% if profile_photo_url %}
            <img src="{{ profile_photo_url }}" alt="" class="h-full w-full object-cover" width="36" height="36">
          {% else %}
            <div class="h-full w-full bg-gradient-to-br from-slate-300 to-slate-500" aria-hidden></div>
          {% endif %}
        </a>
      {% else %}
        <div class="h-9 w-9 shrink-0 rounded-full bg-gradient-to-br from-slate-300 to-slate-500 ring-2 ring-white" aria-hidden></div>
      {% endif %}
    </div>
  </div>
</header>
